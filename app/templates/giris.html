<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Giriş — Solariz CPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ range(100000,999999)|random }}">
<style>
body { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 60%, #fbbf24 100%); min-height:100vh; }
.giris-sarmal { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.giris-kutu {
  background:#fff; border-radius:16px; padding:36px 40px; width:100%; max-width:380px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.15);
}
.giris-logo { text-align:center; margin-bottom:24px; }
.giris-logo svg { width:56px; height:56px; }
.giris-logo h1 { font-size:18px; font-weight:800; letter-spacing:3px; color:#1a1a1a; margin-top:8px; }
.giris-logo p  { font-size:11px; letter-spacing:3px; color:var(--text3); font-weight:600; text-transform:uppercase; margin-top:2px; }
.giris-kutu .fg { margin-bottom:14px; }
.giris-kutu label { display:block; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:5px; }
.giris-kutu input {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; font-size:14px; outline:none; font-family:var(--sans);
}
.giris-kutu input:focus { border-color:var(--sol); box-shadow:0 0 0 3px var(--accent-glow); }
.giris-kutu button {
  width:100%; padding:10px; background: linear-gradient(90deg, var(--sol), var(--sol-dark));
  color:#fff; border:none; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; margin-top:4px;
}
.hata-kutu {
  background:rgba(220,38,38,0.08); border:1px solid rgba(220,38,38,0.25);
  color:var(--red); padding:10px; border-radius:8px; margin-bottom:14px; font-size:13px; font-weight:600; text-align:center;
}
.ipucu {
  margin-top:18px; padding:10px; background:var(--bg4); border-radius:8px;
  font-size:11px; color:var(--text3); text-align:center;
}
.ipucu strong { color:var(--text2); }
</style>
</head>
<body>
<div class="giris-sarmal">
  <div class="giris-kutu">
    <div class="giris-logo">
      <svg viewBox="0 0 100 100">
        <defs><radialGradient id="g"><stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#F97316"/></radialGradient></defs>
        <circle cx="50" cy="50" r="20" fill="url(#g)"/>
        <g stroke="#F97316" stroke-width="3" stroke-linecap="round">
          <line x1="50" y1="10" x2="50" y2="24"/>
          <line x1="50" y1="76" x2="50" y2="90"/>
          <line x1="10" y1="50" x2="24" y2="50"/>
          <line x1="76" y1="50" x2="90" y2="50"/>
          <line x1="22" y1="22" x2="32" y2="32"/>
          <line x1="68" y1="68" x2="78" y2="78"/>
          <line x1="78" y1="22" x2="68" y2="32"/>
          <line x1="32" y1="68" x2="22" y2="78"/>
        </g>
      </svg>
      <h1>SOLARIZ</h1>
      <p>CPS SİSTEMİ</p>
    </div>

    {% if hata %}<div class="hata-kutu">{{ hata }}</div>{% endif %}

    <form method="post">
      <input type="hidden" name="next" value="{{ request.args.get('next','') }}">
      <div class="fg">
        <label>Kullanıcı Adı</label>
        <input type="text" name="kullanici" required autofocus autocomplete="username">
      </div>
      <div class="fg">
        <label>Şifre</label>
        <input type="password" name="sifre" required autocomplete="current-password">
      </div>
      <button type="submit">Giriş Yap</button>
    </form>

    <!-- TEST_KULLANICILARI_GIZLI 2026-05-12 - Adem talimati uzerine kullanici gosterimi kapatildi -->

      <strong>Test kullanıcıları:</strong><br>

      <span style="display:block; margin-top:4px; font-size:10px;">(cin.ofis ve muhasebe ilk girişte şifre değiştirmek zorunda)</span>
    </div>
-->
  </div>
</div>
</body>
</html>
