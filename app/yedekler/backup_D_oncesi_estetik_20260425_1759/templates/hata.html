{% extends "base.html" %}
{% block title %}{{ kod }} — {{ baslik }}{% endblock %}

{% block content %}

<div style="min-height:60vh; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
  <div style="text-align:center; max-width:480px;">
    <div style="font-size:96px; font-weight:900; font-family:var(--mono);
                background:linear-gradient(135deg, var(--sol), var(--sol-dark));
                -webkit-background-clip:text; background-clip:text; color:transparent;
                line-height:1; margin-bottom:12px;">{{ kod }}</div>

    <h2 style="font-size:24px; margin-bottom:10px; color:var(--text);">{{ baslik }}</h2>
    <p style="color:var(--text3); margin-bottom:24px; font-size:14px;">{{ mesaj }}</p>

    <div style="display:flex; gap:10px; justify-content:center;">
      <a href="/" class="btn btn-primary">← Ana Sayfa</a>
      <a href="javascript:history.back()" class="btn btn-outline">Geri Git</a>
    </div>

    {% if kod == 403 %}
    <div style="margin-top:24px; font-size:11px; color:var(--text3); padding:10px; background:var(--bg3); border-radius:8px;">
      İhtiyacınız olan yetkiyi Yönetim ekibinden talep edebilirsiniz.
    </div>
    {% endif %}
  </div>
</div>

{% endblock %}
